solution:
  created-for: CMSIS-Toolbox@2.13.0
  cdefault:
  compiler: GCC@14.3.1

  packs:
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::Cortex_DFP@>=1.1.0
    - pack: ARM::CMSIS-NN
    - pack: PyTorch::ExecuTorch

  target-types:
    - type: ARMCM55
      device: ARM::ARMCM55
      target-set:
        - set:
          images:
            - project-context: all_ops.Debug
          debugger:
            name: CMSIS-DAP@pyOCD
            clock: 10000000
            protocol: swd

  build-types:
    - type: Debug
      debug: on
      optimize: debug

  projects:
    # Generated by gen_cproject.py (run.sh regenerates it before cbuild).
    - project: ./all_ops.cproject.yml
