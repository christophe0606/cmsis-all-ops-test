solution:
  created-for: CMSIS-Toolbox@2.14.0
  cdefault: #compiler: CLANG@22.1.0

  compiler: AC6@6.24.0
  #compiler: GCC@14.3.1

  packs:
    - pack: ARM::Cortex_DFP@>=1.1.0
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::CMSIS-NN
    - pack: ARM::CMSIS-Compiler
    - pack: AlifSemiconductor::Ensemble@2.1.0
    - pack: PyTorch::ExecuTorch@1.3.1-rc9

  target-types:
    - type: ARMCM55
      device: ARM::ARMCM55
      define:
        - MODEL_ALIGNMENT: 16
      variables:
        - Board-Layer: $SolutionDir()$/boards/M55/Board.clayer.yml
      target-set:
        - set:
          images:
            - project-context: all_ops.Debug
          debugger:
            name: CMSIS-DAP@pyOCD
            clock: 10000000
            protocol: swd

    - type: AE722F80F55D5LS
      board: AppKit-E7-AIML
      device: AE722F80F55D5LS
      memory:
        - name: OSPI1
          access: rwx
          start: 0xC0000000
          size: 0x04000000
      variables:
        - Board-Layer: $SolutionDir()$/boards/AppKit-E7_M55_HE/Board_HE.clayer.yml
      define:
        - MODEL_ALIGNMENT: 16
      target-set:
        - set:
          images:
            - project-context: all_ops.Debug
            #- image: flash.bin
            #  type: bin
            #  load: image
            #  load-offset: 0xC0000000 # APP_OSPI_FLASH_HE_BASE / OSPI1 base (pyOCD only)
            #  device: :M55_HE
          debugger:
            name: ULINKplus@pyOCD
            clock: 10000000
            protocol: swd
            port: 3333

  build-types:
    - type: Debug
      debug: on
      optimize: debug

  projects:
    # Generated by gen_cproject.py (run.sh regenerates it before cbuild).
    - project: ./all_ops.cproject.yml
