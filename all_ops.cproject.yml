  misc:
    # AtFE/CLANG: force hard-float and -include the random_device shim so the RNG
    # ops build against AtFE's libc++ (_LIBCPP_HAS_RANDOM_DEVICE 0; the shim
    # self-guards, so it is a no-op for GCC/AC6). NOTE: re-asserting -mcpu here
    # does NOT undo cbuild CLANG.cmake's -mfpu=fpv5-sp-d16, which disables MVE.fp
    # (__ARM_FEATURE_MVE 3 -> 1); the Cortex-M Helium ops still need the op-guard
    # patch (FP bit) and/or the toolbox -mfpu fix. See REPORT.md.
    - for-compiler: CLANG
      C: [-mcpu=cortex-m55, -mfloat-abi=hard]
      CPP: [-mcpu=cortex-m55, -mfloat-abi=hard, -include, random_device_shim.h]
      ASM: [-mcpu=cortex-m55, -mfloat-abi=hard]
      Link: [-mcpu=cortex-m55, -mfloat-abi=hard]
    # AC6: armlink's RW-data decompressor hardfaults at startup; disable RW
    # compression so scatter-load does a plain copy.
    - for-compiler: AC6
      C: [-ffp-mode=full]
      CPP: [-ffp-mode=full]
      Link: [--datacompressor=off]

  groups:
    - group: App
      files:
        - file: ./app.cpp
        # Per-op test models embedded into .rodata (.incbin) by
        # gen_embedded_models.py. A stub (0 models) is emitted when the model
        # export step has not run, so build/link coverage works without torch.
        - file: ./embedded_models.cpp
        - file: ./arm_embedded_module.cpp
        - file: ./arm_memory_allocator.cpp
        - file: ./embedded_models_blob.S
          for-context: +ARMCM55
        - file: ./et_pal_override.cpp
        - file: ./container.c

  layers:
    - layer: $Board-Layer$
      type: Board
